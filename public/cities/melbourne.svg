<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Melbourne">
  <defs>
    <linearGradient id="mlb-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D4A4A"/>
      <stop offset="60%" stop-color="#0E5E5A"/>
      <stop offset="100%" stop-color="#072E2E"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#mlb-bg)"/>
  <!-- Subtle skyline silhouette -->
  <g opacity="0.35" fill="#041C1C">
    <rect x="120" y="600" width="60" height="240"/>
    <rect x="200" y="540" width="90" height="300"/>
    <rect x="310" y="480" width="70" height="360"/>
    <rect x="400" y="560" width="50" height="280"/>
    <rect x="470" y="420" width="110" height="420"/>
    <polygon points="590,420 630,380 670,420 670,840 590,840"/>
    <rect x="690" y="500" width="80" height="340"/>
    <rect x="790" y="460" width="60" height="380"/>
    <rect x="870" y="540" width="100" height="300"/>
    <rect x="990" y="580" width="70" height="260"/>
  </g>
  <rect x="0" y="840" width="1200" height="60" fill="#041C1C"/>
  <!-- Massive city name embedded -->
  <text x="1160" y="760" font-family="Manrope, 'Helvetica Neue', system-ui, sans-serif" font-size="220" font-weight="800" fill="#FFFFFF" fill-opacity="0.6" letter-spacing="-6" text-anchor="end">MELBOURNE</text>
</svg>

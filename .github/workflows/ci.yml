name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_TELEMETRY_DISABLED: 1
      # Build-time env. Real secrets live in Vercel - these placeholders
      # only satisfy `next build`'s client-bundle validation.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: https://eventlinqs.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  types-drift-guard:
    name: types-drift guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # [2026-06-07] BLOCKING. The SUPABASE_ACCESS_TOKEN repository secret
    # is now configured and the guard was verified green on 6e6223c, so
    # schema-vs-committed-types drift gates merges as intended (the class
    # of bug that broke checkout on 2026-05-28). It was non-blocking from
    # 2026-05-28 only while the secret was unset. To temporarily relax it
    # (e.g. if the token is rotated and CI cannot reach the live schema),
    # set continue-on-error: true again with a dated reason.
    continue-on-error: false

    # Regenerates src/types/database.ts from the live Supabase schema
    # and diffs the result against the committed generated section. The
    # legacy-aliases appendix below the BEGIN LEGACY ALIASES marker is
    # excluded from the diff. Catches the schema-vs-code drift class of
    # bug that broke the checkout page on 2026-05-28 (PR #51).
    #
    # SUPABASE_ACCESS_TOKEN must be set as a repository secret. See
    # supabase.com/dashboard > account > access tokens. The token grants
    # read-only access to the project schema (no data); rotate annually.

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify SUPABASE_ACCESS_TOKEN is configured
        run: |
          if [[ -z "${SUPABASE_ACCESS_TOKEN}" ]]; then
            echo "::error::types-drift-guard requires repository secret SUPABASE_ACCESS_TOKEN."
            echo "::error::Add under Settings > Secrets and variables > Actions."
            echo "::error::Token needs schema-read access to project gndnldyfudbytbboxesk."
            exit 1
          fi
          echo "SUPABASE_ACCESS_TOKEN is set (length ${#SUPABASE_ACCESS_TOKEN})."

      - name: Run types-drift guard
        run: bash scripts/check-types-drift.sh

  test:
    name: test (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_TELEMETRY_DISABLED: 1
      # Build-time env. Real secrets live in Vercel - these placeholders
      # only satisfy module imports that validate client-bundle env.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: https://eventlinqs.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

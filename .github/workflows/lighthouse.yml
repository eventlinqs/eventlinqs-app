# Lighthouse CI gate - enforces docs/MEDIA-ARCHITECTURE.md §12.2.
#
# Hard gate covering every public page type, measured against the DEPLOYED
# VERCEL PREVIEW for the PR commit - not localhost.
#
# Why the preview, not localhost (changed on release/launch-line):
#   The previous gate booted a local Supabase stack, built the app, and ran
#   Lighthouse against `npm run start` on localhost:3000 with a HARDCODED seed
#   event slug (/events/afrobeats-melbourne-summer-sessions) in
#   lighthouserc.json. When the seed stopped producing that exact slug the
#   event-detail URL 404'd, and LHCI treats any 404 in the URL set as a hard
#   `collect` failure (ERRORED_DOCUMENT_REQUEST) - failing the whole gate
#   regardless of scores. The gate also did not measure the artefact users
#   actually receive. It now:
#     1. Resolves the warmed Vercel preview URL for the PR commit (from the
#        GitHub deployments API Vercel posts), then audits that.
#     2. Discovers a real, resolvable /events/<slug> from the preview's own
#        sitemap (scripts/ci/resolve-gate-urls.mjs) instead of a stale slug.
#     3. Warms ISR + the next/image optimiser with an unrecorded curl pass
#        before measuring, so the score reflects warm-cache reality (the
#        cold-start race is Issue #42, not a per-run flake).
#
# Thresholds are UNCHANGED from the prior gate - the locked assertion floors in
# lighthouserc.json (performance >= 0.80, a11y/BP/SEO = 1.00, CLS <= 0.1, with
# perf warn-waived on / and /culture/* per Issue #42) carry over verbatim. This
# change only moves the target to a reachable warmed preview; it does not amend
# any threshold. Auth-gated surfaces (/dashboard/*, /admin/*, order
# confirmation, squad) stay excluded - they need a recorded-session gate
# (Module M7 / Pre-Task 5).

name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the Vercel preview URL for this commit. Vercel's GitHub integration
  # posts a GitHub Deployment (environment "Preview") with a success status
  # whose environment_url is the *.vercel.app preview. We poll that API
  # directly - no third-party action - and expose the URL downstream.
  # ---------------------------------------------------------------------------
  preview:
    name: Resolve Vercel preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      url: ${{ steps.resolve.outputs.url }}
    steps:
      - name: Wait for Vercel preview deployment
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          echo "Resolving Vercel preview for commit $SHA"
          deadline=$(( $(date +%s) + 600 ))
          url=""
          while [ "$(date +%s)" -lt "$deadline" ]; do
            ids=$(gh api "repos/$REPO/deployments?sha=$SHA&per_page=100" --jq '.[].id' 2>/dev/null || true)
            for id in $ids; do
              found=$(gh api "repos/$REPO/deployments/$id/statuses?per_page=100" \
                --jq 'map(select(.state=="success")) | .[0] | (.environment_url // .target_url) // empty' \
                2>/dev/null || true)
              if [ -n "$found" ] && printf '%s' "$found" | grep -q "vercel.app"; then
                url="$found"
                break
              fi
            done
            if [ -n "$url" ]; then break; fi
            echo "  ...preview not ready yet; sleeping 15s"
            sleep 15
          done
          if [ -z "$url" ]; then
            echo "::error::No successful Vercel preview deployment found for $SHA within 10 minutes."
            echo "::error::The Lighthouse gate measures the deployed preview; it cannot run until Vercel finishes the preview build."
            exit 1
          fi
          url="${url%/}"
          echo "Resolved preview URL: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Lighthouse mobile gate against the warmed preview.
  # ---------------------------------------------------------------------------
  lighthouse:
    name: Lighthouse mobile gate
    needs: preview
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PREVIEW_URL: ${{ needs.preview.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve gate URLs
        run: |
          set -euo pipefail
          node scripts/ci/resolve-gate-urls.mjs > gate-urls.txt
          echo "Gating mobile on:"
          cat gate-urls.txt

      - name: Warm preview (unrecorded curl pass)
        # Warm ISR + the next/image optimiser before measuring, so the gate
        # reflects warm-cache reality (the cold-start race is Issue #42). The
        # el-audit=1 cookie disables motion + hover wash, matching the audited
        # profile (src/app/layout.tsx).
        run: |
          set -euo pipefail
          while IFS= read -r u; do
            [ -z "$u" ] && continue
            for i in 1 2; do
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 45 \
                -H 'Cookie: el-audit=1' "$u" || echo "000")
              echo "  warm[$i] $code $u"
            done
          done < gate-urls.txt

      - name: Run Lighthouse CI
        run: |
          set -euo pipefail
          args=""
          while IFS= read -r u; do
            [ -z "$u" ] && continue
            args="$args --url=$u"
          done < gate-urls.txt
          npx --yes @lhci/cli@0.14.x collect --config=./lighthouserc.json $args
          npx --yes @lhci/cli@0.14.x assert --config=./lighthouserc.json

      - name: Upload Lighthouse reports
        if: always()
        run: npx --yes @lhci/cli@0.14.x upload --config=./lighthouserc.json || true
